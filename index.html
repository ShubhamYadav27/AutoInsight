<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AutoInsight – AI Used Car Analysis</title>
  <meta name="description" content="AI-powered used car analysis platform. Detect damage, predict maintenance costs, and get a BUY/NEGOTIATE/AVOID verdict instantly." />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0f;
      --bg2: #111118;
      --bg3: #1a1a24;
      --bg4: #22222f;
      --border: rgba(255,255,255,0.08);
      --border2: rgba(255,255,255,0.14);
      --text: #f0f0f8;
      --text2: #9090b0;
      --text3: #5a5a78;
      --accent: #6c63ff;
      --accent2: #a89cff;
      --green: #22d07a;
      --amber: #f5a623;
      --red: #ff4f4f;
      --teal: #20d4c4;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      line-height: 1.6;
      min-height: 100vh;
    }

    h1, h2, h3, h4 { font-family: 'Syne', sans-serif; }

    /* Form field base styles */
    .field {
      background: var(--bg3);
      border: 1px solid var(--border2);
      border-radius: 10px;
      padding: 12px 16px;
      color: var(--text);
      font-size: 15px;
      font-family: 'DM Sans', sans-serif;
      transition: border 0.2s;
      outline: none;
      width: 100%;
    }
    .field:focus { border-color: var(--accent); }
    .field option { background: var(--bg3); }
    .field::placeholder { color: var(--text3); }

    /* Spinner */
    .spinner {
      width: 48px; height: 48px; border-radius: 50%;
      border: 3px solid rgba(255,255,255,0.08);
      border-top-color: var(--accent);
      animation: spin 0.8s linear infinite;
      margin: 0 auto 20px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--bg4); border-radius: 3px; }

    @media (max-width: 620px) {
      nav { padding: 16px 20px !important; }
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
